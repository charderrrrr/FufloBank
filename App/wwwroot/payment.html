<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FufloBank - Оплатить</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <a href="/index.html">Главная</a>
        <a href="/payment.html">Оплатить</a>
        <a href="/transfer.html">P2P перевод</a>
        <a href="/conversion.html">Валютная конвертация</a>
        <a href="/history.html">История транзакций</a>
        <a href="/logout">Выход</a>
    </nav>
    <h1>Оплатить</h1>
    <form action="/payment" method="POST">
        <select name="currency" required>
            <option value="">Выберите валюту</option>
            <option value="1">RUB</option>
            <option value="2">USD</option>
            <option value="3">CRYPTO</option>
        </select>
        <input type="number" name="amount" placeholder="Сумма" step="0.01" required>
        <input type="number" name="mccCode" placeholder="MCC код" required>
        <input type="text" name="description" placeholder="Описание">
        <button type="submit">Оплатить</button>
    </form>
 
</body>
</html>
