<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FufloBank - Авторизация</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>FufloBank</h1>
    <h2>Авторизация</h2>    
    <form id="login-form">
        <p id="error-message" style="color: rgb(189, 9, 9); display: none; margin-top: 1rem; margin-bottom: 1rem;"></p>
        <input type="text" id="phone" placeholder="+79000000000" required>
        <button type="submit">войти</button>
        <p>Нет аккаунта? <a href="/register.html">Регистрация</a></p>
    </form>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const errorElement = document.getElementById('error-message');
            
            try {
                await login(phone);
                window.location.href = '/index.html';
            } catch (error) {
                errorElement.textContent = error.message;
                errorElement.style.display = 'block';
            }
        });
    </script>
</body>
</html>
