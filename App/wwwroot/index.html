<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FufloBank - Balance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <a href="/index.html">Главная</a>
        <a href="/payment.html">Оплатить</a>
        <a href="/transfer.html">P2P перевод</a>
        <a href="/conversion.html">Валютная конвертация</a>
        <a href="/history.html">История транзакций</a>
        <a href="#" onclick="logout()">Выход</a>
    </nav>
    <h1>Баланс</h1>
    <div id="user-info"></div>
    <table id="balances-table">
        <thead>
            <tr>
                <th>Валюта</th>
                <th>баланс</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="/js/app.js"></script>
    <script>
        if (!isAuthenticated()) {
            window.location.href = '/login.html';
        }

        async function loadBalances() {
            try {
                const balances = await getBalances();
                const tbody = document.querySelector('#balances-table tbody');
                tbody.innerHTML = '';
                
                balances.forEach(b => {
                    const row = document.createElement('tr');
                    row.innerHTML = `<td>${b.currency}</td><td>${b.balance}</td>`;
                    tbody.appendChild(row);
                });

                const user = getCurrentUser();
                document.getElementById('user-info').innerHTML = `<p style="margin-bottom: 2rem;">Пользователь: ${user.fullName}</p>`;
            } catch (error) {
                console.error(error);
            }
        }

        loadBalances();
    </script>
</body>
</html>
