<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FufloBank - Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <a href="/index.html">Главная</a>
        <a href="/payment.html">Оплатить</a>
        <a href="/transfer.html">P2P перевод</a>
        <a href="/conversion.html">Валютная конвертация</a>
        <a href="/history.html">История транзакций</a>
        <a href="/logout">Выход</a>
    </nav>
    <h1>FufloBank</h1>
    <h2>Регистрация</h2>
    <form id="register-form">
        <input type="text" id="fullName" placeholder="Полное имя" required>
        <input type="text" id="phone" placeholder="+79000000000" required>
        <button type="submit">Регистрация</button>
        <p>Уже есть аккаунт? <a href="/login.html">Войти</a></p>
    </form>
    
    <p id="error-message" style="color: rgb(189, 9, 9); display: none;"></p>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const errorElement = document.getElementById('error-message');
            
            try {
                await register(fullName, phone);
                window.location.href = '/balance.html';
            } catch (error) {
                errorElement.textContent = error.message;
                errorElement.style.display = 'block';
            }
        });
    </script>
</body>
</html>
