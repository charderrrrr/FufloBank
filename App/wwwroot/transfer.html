<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FufloBank - P2P перевод</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <a href="/index.html">Главная</a>
        <a href="/payment.html">Оплатить</a>
        <a href="/transfer.html">P2P перевод</a>
        <a href="/conversion.html">Валютная конвертация</a>
        <a href="/history.html">История транзакций</a>
        <a href="/logout">Выход</a>
    </nav>
    <h1>P2P перевод</h1>
    <form action="/перевод" method="POST">
        <input type="text" name="recipientPhone" placeholder="Телефон получателя (+7XXXXXXXXXX)" required>
        <select name="currency" required>
            <option value="">Выбрать валюту</option>
            <option value="1">RUB</option>
            <option value="2">USD</option>
            <option value="3">CRYPTO</option>
        </select>
        <input type="number" name="amount" placeholder="Сумма" step="0.01" required>
        <div id="confirmation-code-field" style="display: none;">
            <input type="text" name="confirmationCode" placeholder="Код подтверждения">
        </div>
        <button type="submit">Перевод</button>
    </form>
</body>
</html>
