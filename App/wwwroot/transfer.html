<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FufloBank - P2P перевод</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<style>
    #result {
        max-width: 1100px;
        margin: 1.5rem auto 0 auto;
        background: linear-gradient(135deg, #1a0e0e 0%, #140707 100%);
        border-radius: 24px;
        border: 1px solid rgba(173, 83, 83, 0.4);
        padding: 0;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(173, 83, 83, 0.15);
        transition: all 0.3s ease;
    }

    #result p {
        margin: 0;
        padding: 1rem 1.8rem;
        font-family: 'Regular', system-ui, sans-serif;
        font-size: 1rem;
        border-bottom: 1px solid rgba(173, 83, 83, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #e0d6d6;
    }

    #result p:first-child {
        background: rgba(173, 83, 83, 0.15);
        font-family: 'Bold', system-ui, sans-serif;
        font-size: 1.1rem;
        color: rgba(173, 83, 83, 1);
        border-bottom: 2px solid rgba(173, 83, 83, 0.5);
    }

    #result p:last-child {
        border-bottom: none;
    }

    #result p::before {
        content: attr(data-label);
        font-family: 'Medium', system-ui, sans-serif;
        font-weight: 500;
        color: rgba(173, 83, 83, 0.8);
        margin-right: 1rem;
    }

    #result p:first-child::before {
        display: none;
    }

    #result p:nth-child(2)::before {
        content: "Сумма:";
    }

    #result p:nth-child(3)::before {
        content: "Получатель:";
    }

    #result p:nth-child(4)::before {
        content: "Статус:";
    }

    #result p:first-child {
        justify-content: center;
        gap: 0.5rem;
    }

    #result p:first-child::before {
        display: inline;
        margin-right: 0.5rem;
    }

    #result p:first-child::after {
        margin-left: 0.5rem;
    }

    #result p:only-child {
        border-bottom: none;
        justify-content: center;
        color: rgba(173, 83, 83, 0.9);
    }
</style>
<body>
    <nav>
        <a href="/index.html"><h3>FufloBank</h1></a>
        <a href="/payment.html">Оплатить</a>
        <a href="/transfer.html">P2P перевод</a>
        <a href="/conversion.html">Валютная конвертация</a>
        <a href="/history.html">История транзакций</a>
        <a href="#" onclick="logout()">Выход</a>
    </nav>
    <h1>P2P перевод</h1>
    <form id="transfer-form">
        <input type="text" id="recipientPhone" placeholder="Телефон получателя (+7XXXXXXXXXX)" required>
        <select id="currency" required>
            <option value="">Выбрать валюту</option>
            <option value="1">RUB</option>
            <option value="2">USD</option>
            <option value="3">CRYPTO</option>
        </select>
        <input type="number" id="amount" placeholder="Сумма" step="0.01" required>
        <div id="confirmation-code-field" style="display: none;">
            <input type="text" id="confirmationCode" placeholder="Код подтверждения">
        </div>
        <button type="submit">Перевод</button>
    </form>
    <div id="result"></div>

    <script src="/js/app.js"></script>
    <script>
        if (!isAuthenticated()) window.location.href = '/login.html';

        document.getElementById('amount').addEventListener('input', async (e) => {
            const amount = parseFloat(e.target.value);
            if (amount > 0) {
                const limit = await checkTransferLimit(amount);
                document.getElementById('confirmation-code-field').style.display = 
                    limit.requiresConfirmation ? 'block' : 'none';
            }
        });

        document.getElementById('transfer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const recipientPhone = document.getElementById('recipientPhone').value;
            const currency = document.getElementById('currency').value;
            const amount = document.getElementById('amount').value;
            const confirmationCode = document.getElementById('confirmationCode').value;

            try {
                const result = await makeTransfer(recipientPhone, currency, amount, confirmationCode);
                document.getElementById('result').innerHTML = `
                    <p>Успешно :)</p>
                    <p>${result.amount}</p>
                    <p>${result.recipientPhone}</p>
                    <p>${result.status}</p>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `<p style="color: rgb(189, 9, 9);">${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
