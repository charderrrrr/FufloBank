<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FufloBank - P2P перевод</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <a href="/index.html">Главная</a>
        <a href="/payment.html">Оплатить</a>
        <a href="/transfer.html">P2P перевод</a>
        <a href="/conversion.html">Валютная конвертация</a>
        <a href="/history.html">История транзакций</a>
        <a href="#" onclick="logout()">Выход</a>
    </nav>
    <h1>P2P перевод</h1>
    <form id="transfer-form">
        <input type="text" id="recipientPhone" placeholder="Телефон получателя (+7XXXXXXXXXX)" required>
        <select id="currency" required>
            <option value="">Выбрать валюту</option>
            <option value="1">RUB</option>
            <option value="2">USD</option>
            <option value="3">CRYPTO</option>
        </select>
        <input type="number" id="amount" placeholder="Сумма" step="0.01" required>
        <div id="confirmation-code-field" style="display: none;">
            <input type="text" id="confirmationCode" placeholder="Код подтверждения">
        </div>
        <button type="submit">Перевод</button>
    </form>
    <div id="result"></div>

    <script src="/js/app.js"></script>
    <script>
        if (!isAuthenticated()) window.location.href = '/login.html';

        document.getElementById('amount').addEventListener('input', async (e) => {
            const amount = parseFloat(e.target.value);
            if (amount > 0) {
                const limit = await checkTransferLimit(amount);
                document.getElementById('confirmation-code-field').style.display = 
                    limit.requiresConfirmation ? 'block' : 'none';
            }
        });

        document.getElementById('transfer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const recipientPhone = document.getElementById('recipientPhone').value;
            const currency = document.getElementById('currency').value;
            const amount = document.getElementById('amount').value;
            const confirmationCode = document.getElementById('confirmationCode').value;

            try {
                const result = await makeTransfer(recipientPhone, currency, amount, confirmationCode);
                document.getElementById('result').innerHTML = `
                    <p>Перевод выполнен</p>
                    <p>Сумма: ${result.amount}</p>
                    <p>Получатель: ${result.recipientPhone}</p>
                    <p>Статус: ${result.status}</p>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `<p style="color: rgb(189, 9, 9);">${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
