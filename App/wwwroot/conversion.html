<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FufloBank - Конвертация валюты</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<style>
    #result {
        max-width: 1100px;
        margin: 1.5rem auto 0 auto;
        background: linear-gradient(135deg, #1a0e0e 0%, #140707 100%);
        border-radius: 24px;
        border: 1px solid rgba(173, 83, 83, 0.4);
        padding: 0;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(173, 83, 83, 0.15);
        transition: all 0.3s ease;
    }

    #result p {
        margin: 0;
        padding: 1.5rem 2rem;
        font-family: 'Regular', system-ui, sans-serif;
        font-size: 1.1rem;
        text-align: center;
        color: #e0d6d6;
        background: linear-gradient(135deg, #1a0e0e 0%, #140707 100%);
        letter-spacing: 0.3px;
    }

    #result p:only-child {
        border-bottom: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.8rem;
    }

    #result p[style*="color: rgb(189, 9, 9)"] {
        background: rgba(189, 9, 9, 0.1);
        border-left: 4px solid rgb(189, 9, 9);
        color: rgb(189, 9, 9);
        text-align: left;
        padding: 1rem 1.5rem;
    }

    #result p[style*="color: rgb(189, 9, 9)"]::before {
        content: "⚠️ ";
        font-size: 1rem;
        display: inline;
        margin-right: 0.5rem;
    }

    #result p[style*="color: rgb(189, 9, 9)"]::after {
        display: none;
    }
</style>
<body>
    <nav>
        <a href="/index.html"><h3>FufloBank</h1></a>
        <a href="/payment.html">Оплатить</a>
        <a href="/transfer.html">P2P перевод</a>
        <a href="/conversion.html">Валютная конвертация</a>
        <a href="/history.html">История транзакций</a>
        <a href="#" onclick="logout()">Выход</a>
    </nav>
    <h1>Валютная конвертация</h1>
    <form id="conversion-form">
        <select id="fromCurrency" required>
            <option value="">Из</option>
            <option value="1">RUB</option>
            <option value="2">USD</option>
            <option value="3">CRYPTO</option>
        </select>
        <select id="toCurrency" required>
            <option value="">В</option>
            <option value="1">RUB</option>
            <option value="2">USD</option>
            <option value="3">CRYPTO</option>
        </select>
        <input type="number" id="amount" placeholder="Amount" step="0.01" required>
        <button type="submit">Конвертировать</button>
    </form>
    <div id="result"></div>

    <script src="/js/app.js"></script>
    <script>
        if (!isAuthenticated()) window.location.href = '/login.html';

        document.getElementById('conversion-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fromCurrency = document.getElementById('fromCurrency').value;
            const toCurrency = document.getElementById('toCurrency').value;
            const amount = document.getElementById('amount').value;

            try {
                const result = await convertCurrency(fromCurrency, toCurrency, amount);
                document.getElementById('result').innerHTML = `
                    <p>Успешный перевод! :) Из ${result.originalAmount} ${result.fromCurrency} в ${result.convertedAmount} ${result.toCurrency}</p>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `<p>${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
