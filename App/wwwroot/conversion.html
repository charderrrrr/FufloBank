<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FufloBank - Конвертация валюты</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <a href="/index.html">Главная</a>
        <a href="/payment.html">Оплатить</a>
        <a href="/transfer.html">P2P перевод</a>
        <a href="/conversion.html">Валютная конвертация</a>
        <a href="/history.html">История транзакций</a>
        <a href="#" onclick="logout()">Выход</a>
    </nav>
    <h1>Валютная конвертация</h1>
    <form id="conversion-form">
        <select id="fromCurrency" required>
            <option value="">Из</option>
            <option value="1">RUB</option>
            <option value="2">USD</option>
            <option value="3">CRYPTO</option>
        </select>
        <select id="toCurrency" required>
            <option value="">В</option>
            <option value="1">RUB</option>
            <option value="2">USD</option>
            <option value="3">CRYPTO</option>
        </select>
        <input type="number" id="amount" placeholder="Amount" step="0.01" required>
        <button type="submit">Конвертировать</button>
    </form>
    <div id="result"></div>

    <script src="/js/app.js"></script>
    <script>
        if (!isAuthenticated()) window.location.href = '/login.html';

        document.getElementById('conversion-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fromCurrency = document.getElementById('fromCurrency').value;
            const toCurrency = document.getElementById('toCurrency').value;
            const amount = document.getElementById('amount').value;

            try {
                const result = await convertCurrency(fromCurrency, toCurrency, amount);
                document.getElementById('result').innerHTML = `
                    <p>${result.originalAmount} ${result.fromCurrency} = ${result.convertedAmount} ${result.toCurrency}</p>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `<p style="color: rgb(189, 9, 9);">${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
